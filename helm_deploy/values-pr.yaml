---
# Per environment values which override defaults in hmpps-template-typescript/values.yaml

generic-service:
  replicaCount: 1

  ingress:
    host: template-typescript-dev.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://template-typescript-dev.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "http://hmpps-auth:9090/auth"
    EXAMPLE_API_URL: 'http://hmpps-template-kotlin:8080'
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-dev.prison.service.justice.gov.uk"
    TOKEN_VERIFICATION_ENABLED: false
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"

  extraContainers:
    - name: hmpps-auth
      image: ghcr.io/ministryofjustice/hmpps-auth-stub:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: PORT
          value: '9090'
        - name: PRODUCT_ID
          value: 'AUTH_STUB'
        - name: INGRESS_URL
          value: 'http://hmpps-auth:9090/auth'
      ports:
        - name: http
          containerPort: 9090
          protocol: TCP
    - name: hmpps-template-kotlin
      image: ghcr.io/ministryofjustice/hmpps-template-kotlin:latest
      imagePullPolicy: IfNotPresent
      env:
        - name: SERVER_PORT
          value: '8080'
        - name: HMPPS_AUTH_URL
          value: 'http://hmpps-auth:9090/auth'
        - name: SPRING_PROFILES_ACTIVE
          value: 'dev'
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP

  allowlist:
    groups:
      - circleci
      - internal
      - prisons

generic-prometheus-alerts:
  alertSeverity: